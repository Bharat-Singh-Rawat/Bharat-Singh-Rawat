name: Generate Snake Animation

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows you to run this job manually from the Actions tab
  workflow_dispatch:

# CRITICAL FIX: Grants the GITHUB_TOKEN permission to push to the output branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate the Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Bharat-Singh-Rawat
          # Generates the snake with Kill Bill Yellow and Stranger Things Red dots
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FFFF00&color_dots=#0d1117,#4d0000,#990000,#e60000,#ff4d4d

      - name: Push the Snake to the Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
