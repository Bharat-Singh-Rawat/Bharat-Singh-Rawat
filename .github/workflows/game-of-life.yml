name: Generate Game of Life SVG

on:
  # Run every 24 hours
  schedule:
    - cron: "0 0 * * *" 
  # Allow manual refresh
  workflow_dispatch:
  # Run on every push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a game of life SVG from a github user's contributions graph
      - name: generate-game-of-life-svg
        uses: Sleek-S-Cat/github-action-game-of-life@master
        with:
          github_user_name: Bharat-Singh-Rawt
          outputs: |
            dist/game-of-life.svg?palette=github-dark&color_snake=#E21F26&color_dots=#90EE90,#E21F26,#ffcc00,#ff3e3e,#8B0000
            
      - name: push game-of-life.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
