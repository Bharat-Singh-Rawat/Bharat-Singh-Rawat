name: Generate Game of Life SVG

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    # THE FIX: Explicitly grant push permissions so the action can commit the SVG
    permissions:
      contents: write
      
    steps:
      - name: generate-game-of-life-svg
        uses: Sleek-S-Cat/github-action-game-of-life@master
        with:
          github_user_name: Bharat-Singh-Rawat
          outputs: |
            dist/game-of-life.svg?palette=github-dark&color_snake=#E21F26&color_dots=#90EE90,#E21F26,#ffcc00,#ff3e3e,#8B0000
            
      - name: push game-of-life.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
